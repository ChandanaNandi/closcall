<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ClosCall{% endblock %}</title>
  <script src="/ui/static/htmx.min.js"></script>
  <script src="/ui/static/csrf.js" defer></script>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --line:#2a2f3a; --fg:#e6e9ef; --muted:#9aa4b2;
            --accent:#4f8cff; --danger:#e5484d; --warn-bg:#3a2a12; --warn-line:#e0a800; --ok:#2ecc71; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:var(--bg); color:var(--fg); }
    header { padding:12px 20px; border-bottom:1px solid var(--line); display:flex;
             justify-content:space-between; align-items:center; }
    header .brand { font-weight:700; letter-spacing:.3px; }
    main { max-width:960px; margin:0 auto; padding:20px; }
    a { color:var(--accent); text-decoration:none; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px;
            margin-bottom:16px; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px;
            border:1px solid var(--line); color:var(--muted); }
    pre { background:#0b0d11; border:1px solid var(--line); border-radius:8px; padding:12px;
          overflow:auto; font-size:12px; }
    button { font:inherit; padding:9px 16px; border-radius:8px; border:1px solid var(--line);
             background:#20242e; color:var(--fg); cursor:pointer; }
    button.approve { background:var(--accent); border-color:var(--accent); color:#04122e; font-weight:700; }
    button.reject { border-color:var(--danger); color:#ffbfc1; }
    .muted { color:var(--muted); }
    .flash { color:var(--ok); font-weight:600; }
    /* H07 safety banner: loud, sticky, sits directly above the approve controls. */
    .h07 { position:sticky; top:0; z-index:5; background:var(--warn-bg);
           border:2px solid var(--warn-line); border-radius:8px; padding:12px 14px; margin-bottom:12px;
           color:#ffe9a8; font-weight:600; display:flex; gap:10px; align-items:flex-start; }
    .h07 .icon { font-size:18px; line-height:1; }
    .actions { display:flex; gap:10px; margin-top:6px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">ClosCall — HITL</div>
    <div class="muted">{% block who %}{% endblock %}</div>
  </header>
  <main>{% block body %}{% endblock %}</main>
</body>
</html>
