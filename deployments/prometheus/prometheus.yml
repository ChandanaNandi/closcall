# Prometheus scrape config for the ClosCall observation plane (Bible §9).
global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: gnmic
    static_configs:
      - targets: ["gnmic:9273"]
  - job_name: gnmic-self
    static_configs:
      - targets: ["gnmic:9273"]
    metric_relabel_configs: []
