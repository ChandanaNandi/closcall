# Alembic config — Alembic is the ONLY schema-change mechanism (Contracts §2).
# The URL is supplied programmatically from the environment in alembic/env.py (no secret here, §6).
[alembic]
script_location = migrations
prepend_sys_path = src

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = WARNING
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
